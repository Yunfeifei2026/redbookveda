  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #fff; }
    p { font-size: 13px; color: #888; margin-bottom: 36px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }
    .card {
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover { transform: translateY(-3px); border-color: #666; }
    .thumb {
      width: 100%;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .info { padding: 12px; background: #1a1a1a; }
    .num { font-size: 10px; color: #555; letter-spacing: 0.15em; margin-bottom: 4px; }
    .name { font-size: 14px; font-weight: 600; color: #eee; margin-bottom: 3px; }
    .desc { font-size: 11px; color: #666; }
  </style>
</head>
